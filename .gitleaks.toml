# gitleaks config — secret scanning for the repo (CI + pre-commit).
title = "inkblot gitleaks config"

[extend]
# Start from gitleaks' maintained default rule set.
useDefault = true

[allowlist]
description = "Non-secret placeholders and lockfiles"
paths = [
  '''pnpm-lock\.yaml''',
  '''\.env\.example''',
]
regexes = [
  '''placeholder''',
  '''dev-placeholder-not-a-real-secret-build-only''',
]
